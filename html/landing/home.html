<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioV - Home</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
>

<link rel="stylesheet" href="/css/globals/variables.css">
<link rel="stylesheet" href="/css/globals/reset.css">
<link rel="stylesheet" href="/css/globals/typography.css">
<link rel="stylesheet" href="/css/globals/utilities.css">
<link rel="stylesheet" href="/css/components/button.css">
<link rel="stylesheet" href="/css/components/navbar.css">
<link rel="stylesheet" href="/css/landing/hero.css"

<link rel="stylesheet" href="/css/pages/style.css">

</head>
<body>

    <header class="navbar">
        <div class="container">

            <a href="/html/landing/home.html" class="navbar-logo">
                <img
                    src="/assets/logos/svg/logo-studiov2000.png"
                    alt="StudioV"
                >
            </a>

            <nav class="navbar-menu" aria-label="Main navigation">
                <a href="/html/landing/features.html">Recursos</a>
                <a href="/html/landing/pricing.html">Preços</a>
                <a href="/html/landing/faq.html">FAQ</a>
                <a href="/html/landing/contact.html">Contato</a>
            </nav>

            <div class="navbar-actions">
                <a
                    href="/html/auth/login.html"
                    class="btn btn-secondary"
                >
                    Entrar
                </a>

                <a
                    href="/html/auth/register.html"
                    class="btn btn-primary"
                >
                    Criar conta
                </a>
            </div>

            <button
                class="navbar-toggle"
                type="button"
                aria-label="Abrir menu"
                aria-expanded="false"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>

            <button
                class="navbar-toggle"
                type="button"
                aria-label="Abrir menu"
                aria-expanded="false"
            >
                <span class="sr-only">Abrir menu</span>
            </button>

        </div>
    </header>

    <section class="hero">
        <div class="container">

            <div class="hero-content">

                <span class="hero-badge">
                    Plataforma inteligente para criadores
                </span>

                <h1 class="hero-title">
                    Crie, organize e publique conteúdo em um só lugar.
                </h1>

                <p class="hero-description">
                    Planeje suas ideias, produza conteúdos com inteligência
                    artificial e publique em diferentes plataformas.
                </p>

                <div class="hero-actions">
                    <a
                        href="/html/auth/register.html"
                        class="btn btn-primary btn-lg"
                    >
                        Começar gratuitamente
                    </a>

                    <a
                        href="#demo"
                        class="btn btn-secondary btn-lg"
                    >
                        Ver demonstração
                    </a>
                </div>

            </div>

            <div class="hero-preview" id="demo">
                <video width="1920" height="1080" autoplay muted loop playsinline>
                    <source src="/assets/videos/mockup1.mp4" type="video/webm">
                    <p>Seu navegador não suporta o elemento de vídeo.</p>
                </video>
            </div>
        </div>
    </section>



</body>
</html>
